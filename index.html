<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="成之於語">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>成之於語｜成語地圖探險</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--pd:#c2506a;--pl:#fde8ec;--brown:#5a2d2d}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--pl);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}
/* 共用按鈕 */
.bm{background:linear-gradient(135deg,var(--pd),#e87090);color:white;border:none;border-radius:50px;padding:1rem 3rem;font-size:1.2rem;font-family:'Noto Sans TC',sans-serif;font-weight:700;cursor:pointer;letter-spacing:.15em;box-shadow:0 6px 20px rgba(194,80,106,.4);transition:all .2s;width:100%}
.bm:active{transform:scale(.96)}
.bs{background:white;color:var(--pd);border:2px solid #f4a0b0;border-radius:50px;padding:.7rem 2rem;font-size:1rem;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;width:100%}
.bs:active{transform:scale(.96)}
.bb{background:#fde8ec;border:none;border-radius:50%;width:44px;height:44px;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.2rem;background:white;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.hdr-title{font-family:'Noto Serif TC',serif;font-size:1.2rem;color:var(--pd);font-weight:900;flex:1;padding:0 .5rem}
.sstrip{display:flex;gap:.8rem}
.schip{display:flex;align-items:center;gap:.4rem;background:#fde8ec;border-radius:20px;padding:.3rem .8rem;font-size:1rem;font-weight:700;color:var(--brown)}
.sdot{width:10px;height:10px;border-radius:50%}
/* 標題 */
#s-title{display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#fde8ec,#fdf0e0);padding:2rem}
.logo{font-family:'Noto Serif TC',serif;font-size:clamp(3rem,10vw,7rem);font-weight:900;color:var(--pd);text-shadow:4px 4px 0 rgba(194,80,106,.2);letter-spacing:.2em;margin-bottom:.3rem}
.sub{font-size:1.1rem;color:#a06070;letter-spacing:.3em;margin-bottom:1.8rem}
.card{background:white;border-radius:20px;padding:1.5rem 2rem;margin-bottom:1.2rem;box-shadow:0 8px 30px rgba(194,80,106,.12);width:100%;max-width:440px}
.card h3{font-size:.85rem;color:#a06070;letter-spacing:.2em;margin-bottom:1rem;text-align:center}
.irow{display:flex;align-items:center;gap:.8rem;margin-bottom:.8rem}
.d16{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.ni{flex:1;border:2px solid #f0d0d8;border-radius:12px;padding:.7rem 1rem;font-size:1rem;font-family:'Noto Sans TC',sans-serif;color:var(--brown);outline:none;transition:border-color .2s}
.ni:focus{border-color:var(--pd)}
.scores{display:flex;gap:2rem;justify-content:center}
.si{text-align:center}
.sid{width:14px;height:14px;border-radius:50%;margin:0 auto .4rem}
.si span{display:block;font-size:.85rem;color:#a06070;margin-bottom:.2rem}
.si strong{font-size:2.5rem;font-family:'Noto Serif TC',serif;color:var(--brown)}
.btns{display:flex;flex-direction:column;gap:1rem;align-items:center;width:100%;max-width:320px}
/* 地圖 */
#s-map{background:linear-gradient(160deg,#fff3e0,#fde8ec)}
.mscroll{overflow:auto;padding:1rem}
.mgrid{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);width:100%;max-width:900px;margin:0 auto;background:white;border-radius:16px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.1);aspect-ratio:1/1}
.mc{border:1px solid rgba(0,0,0,.06);position:relative;background:#fafafa;padding:3px 5px}
.cn{font-size:clamp(.4rem,.9vw,.65rem);color:#ccc;font-weight:500;line-height:1}
.zone-animal{background:rgba(123,201,126,.22)!important}
.zone-number{background:rgba(106,171,247,.22)!important}
.zone-color{background:rgba(180,142,244,.22)!important}
.zone-body{background:rgba(244,160,85,.22)!important}
.zone-boss{background:rgba(244,80,106,.18)!important}
.zbw{display:flex;align-items:center;justify-content:center}
.zb{width:85%;height:85%;border:none;border-radius:50%;cursor:pointer;box-shadow:0 6px 22px rgba(0,0,0,.28);transition:all .2s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.15rem}
.zb:active{transform:scale(.9)}
.zb.cleared{opacity:.55;filter:grayscale(.4)}
.zbi{font-size:clamp(1.6rem,3.5vw,2.8rem);line-height:1}
.zbl{font-size:clamp(.5rem,1.1vw,.75rem);font-weight:700;color:white;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.35)}
/* 關卡 */
#s-quest{background:linear-gradient(160deg,#fff3e0,#fde8ec)}
.qbody{padding:1.5rem;max-width:720px;margin:0 auto}
.qcard{background:white;border-radius:24px;padding:2.5rem 2rem;box-shadow:0 8px 30px rgba(0,0,0,.08);margin-bottom:1.2rem;text-align:center;animation:ci .35s cubic-bezier(.34,1.56,.64,1)}
.qnum{font-size:.95rem;color:#bbb;letter-spacing:.2em;margin-bottom:.8rem}
.qtxt{font-family:'Noto Serif TC',serif;font-size:clamp(2.2rem,6vw,4rem);font-weight:900;color:var(--brown);letter-spacing:.3em;margin:.5rem 0 1rem;line-height:1.3}
.qhint{font-size:1.05rem;color:#a0a0a0}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem}
.cb{background:white;border:3px solid #eee;border-radius:20px;padding:1.2rem 1rem;font-size:clamp(1rem,2.5vw,1.25rem);font-family:'Noto Sans TC',sans-serif;font-weight:500;color:var(--brown);cursor:pointer;transition:all .2s;line-height:1.4;min-height:80px;display:flex;align-items:center;justify-content:center;text-align:center}
.cb.correct{background:#e8f5e9;border-color:#66bb6a;color:#2e7d32}
.cb.wrong{background:#ffebee;border-color:#ef5350;color:#c62828}
.spanel{background:white;border-radius:20px;padding:1rem;margin-bottom:1.2rem;display:flex;gap:1rem;box-shadow:0 4px 16px rgba(0,0,0,.06)}
.tsb{flex:1;border:none;border-radius:16px;padding:1rem;font-family:'Noto Sans TC',sans-serif;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.3rem;font-size:1rem}
.tsb:active{transform:scale(.95)}
.tsb span{font-size:2rem;font-family:'Noto Serif TC',serif}
.nwrap{text-align:center}
#nextBtn{display:none;background:linear-gradient(135deg,var(--pd),#e87090);color:white;border:none;border-radius:50px;padding:1rem 3rem;font-size:1.1rem;font-family:'Noto Sans TC',sans-serif;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(194,80,106,.4)}
/* 後台 */
#s-admin{background:#f8f0f4}
.abody{padding:1.2rem;max-width:800px;margin:0 auto}
.ztabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.2rem}
.ztab{background:white;border:2px solid #eee;border-radius:20px;padding:.5rem 1rem;font-size:.9rem;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:500;transition:all .2s}
.ztab:active{transform:scale(.96)}
.qlist{display:flex;flex-direction:column;gap:.8rem;margin-bottom:1.2rem}
.qi{background:white;border-radius:16px;padding:1rem 1.2rem;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.qi-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.6rem}
.qi-t{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:700;color:var(--brown)}
.qi-h{font-size:.8rem;color:#a0a0a0;margin-bottom:.4rem}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:.3rem}
.cc{font-size:.8rem;padding:.25rem .6rem;border-radius:8px;background:#f5f5f5;color:#666}
.cc.ans{background:#e8f5e9;color:#2e7d32;font-weight:700}
.delbtn{background:#ffebee;color:#ef5350;border:none;border-radius:8px;padding:.3rem .7rem;font-size:.85rem;cursor:pointer;flex-shrink:0;white-space:nowrap;font-family:'Noto Sans TC',sans-serif}
.delbtn:active{transform:scale(.95)}
.aform{background:white;border-radius:20px;padding:1.5rem;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.aform h3{font-size:1rem;color:var(--pd);font-weight:700;margin-bottom:1rem}
.fl{margin-bottom:.8rem}
.fl label{display:block;font-size:.8rem;color:#a06070;margin-bottom:.3rem;font-weight:500}
.fi{width:100%;border:2px solid #f0d0d8;border-radius:10px;padding:.6rem .9rem;font-size:.95rem;font-family:'Noto Sans TC',sans-serif;color:var(--brown);outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--pd)}
.cig{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.5rem}
.ci2{width:100%;border:2px solid #eee;border-radius:10px;padding:.6rem .9rem;font-size:.9rem;font-family:'Noto Sans TC',sans-serif;color:var(--brown);outline:none;transition:all .2s}
.ci2.sa{border-color:#66bb6a;background:#f0fff4}
.ci2:focus{border-color:var(--pd)}
.asel{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.8rem}
.ab2{background:#f5f5f5;border:2px solid #eee;border-radius:10px;padding:.4rem .9rem;font-size:.85rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s}
.ab2.sel{background:#e8f5e9;border-color:#66bb6a;color:#2e7d32;font-weight:700}
/* 彈窗 */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.ov.show{display:flex}
.pop{background:white;border-radius:28px;padding:2.5rem 2rem;text-align:center;max-width:380px;width:90%;animation:ci .35s cubic-bezier(.34,1.56,.64,1)}
.pe{font-size:4.5rem;display:block;margin-bottom:1rem}
.pt{font-family:'Noto Serif TC',serif;font-size:1.8rem;font-weight:900;color:var(--brown);margin-bottom:.5rem}
.ps{font-size:1rem;color:#a0a0a0;margin-bottom:2rem}
.cbns{display:flex;gap:.8rem;margin-top:1.2rem}
.bd{flex:1;background:#ef5350;color:white;border:none;border-radius:12px;padding:.9rem;font-size:1rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:700}
.bc{flex:1;background:#f5f5f5;color:#666;border:none;border-radius:12px;padding:.9rem;font-size:1rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.pwi{width:100%;border:2px solid #f0d0d8;border-radius:12px;padding:.8rem 1rem;font-size:1.2rem;text-align:center;letter-spacing:.3em;outline:none;margin:1rem 0;font-family:'Noto Sans TC',sans-serif;color:var(--brown)}
.pwi:focus{border-color:var(--pd)}
.pwerr{color:#ef5350;font-size:.85rem;min-height:1.2rem;margin-bottom:.5rem}
@keyframes ci{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
</style>
</head>
<body>

<!-- 標題 -->
<div id="s-title" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#fde8ec,#fdf0e0);padding:2rem">
  <div class="logo">成之於語</div>
  <div class="sub">成語地圖探險</div>
  <div class="card">
    <h3>✏️ 輸入隊伍名稱</h3>
    <div class="irow"><div class="d16" style="background:#f4a0b0"></div><input class="ni" id="inA" type="text" placeholder="隊伍 A" maxlength="8"></div>
    <div class="irow"><div class="d16" style="background:#6aabf7"></div><input class="ni" id="inB" type="text" placeholder="隊伍 B" maxlength="8"></div>
  </div>
  <div class="card">
    <h3>📊 當前分數</h3>
    <div class="scores">
      <div class="si"><div class="sid" style="background:#f4a0b0"></div><span id="hn-a">隊伍 A</span><strong id="hs-a">0</strong></div>
      <div class="si"><div class="sid" style="background:#6aabf7"></div><span id="hn-b">隊伍 B</span><strong id="hs-b">0</strong></div>
    </div>
  </div>
  <div class="btns">
    <button class="bm" onclick="goMap()">🗺️ 開始探險</button>
    <button class="bs" onclick="showReset()">🔄 清零分數</button>
    <button class="bs" onclick="showPw()" style="border-color:#b48ef4;color:#7c52c8">⚙️ 後台管理</button>
  </div>
</div>

<!-- 地圖 -->
<div id="s-map" class="screen" style="background:linear-gradient(160deg,#fff3e0,#fde8ec)">
  <div class="hdr">
    <button class="bb" onclick="goTitle()">←</button>
    <div class="hdr-title">🗺️ 成語大地圖</div>
    <div class="sstrip">
      <div class="schip"><div class="sdot" style="background:#f4a0b0"></div><span id="mn-a">A</span>&nbsp;<b id="ms-a">0</b></div>
      <div class="schip"><div class="sdot" style="background:#6aabf7"></div><span id="mn-b">B</span>&nbsp;<b id="ms-b">0</b></div>
    </div>
  </div>
  <div class="mscroll"><div class="mgrid" id="mapGrid"></div></div>
</div>

<!-- 關卡 -->
<div id="s-quest" class="screen" style="background:linear-gradient(160deg,#fff3e0,#fde8ec)">
  <div class="hdr">
    <button class="bb" onclick="goMap()">←</button>
    <div class="hdr-title" id="questTitle">關卡</div>
    <div class="sstrip">
      <div class="schip"><div class="sdot" style="background:#f4a0b0"></div><span id="qn-a">A</span>&nbsp;<b id="qs-a">0</b></div>
      <div class="schip"><div class="sdot" style="background:#6aabf7"></div><span id="qn-b">B</span>&nbsp;<b id="qs-b">0</b></div>
    </div>
  </div>
  <div class="qbody">
    <div class="qcard">
      <div class="qnum" id="qNum">第 1 題 ／ 共 6 題</div>
      <div class="qtxt" id="qTxt"></div>
      <div class="qhint" id="qHint"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="spanel">
      <button class="tsb" style="background:#fff0f3;color:#c2506a" onclick="addScore('A')"><span id="qa-s">0</span><div id="qa-n">隊伍 A</div>＋1 分</button>
      <button class="tsb" style="background:#f0f6ff;color:#3a7fd5" onclick="addScore('B')"><span id="qb-s">0</span><div id="qb-n">隊伍 B</div>＋1 分</button>
    </div>
    <div class="nwrap"><button id="nextBtn" onclick="nextQ()">下一題 →</button></div>
  </div>
</div>

<!-- 後台 -->
<div id="s-admin" class="screen">
  <div class="hdr">
    <button class="bb" onclick="goTitle()">←</button>
    <div class="hdr-title">⚙️ 後台管理</div>
    <div style="font-size:.8rem;color:#a0a0a0;padding-right:.5rem">點題目右側可刪除</div>
  </div>
  <div class="abody">
    <div class="ztabs" id="zoneTabs"></div>
    <div class="qlist" id="qList"></div>
    <div class="aform">
      <h3>＋ 新增題目到此關卡</h3>
      <div class="fl"><label>成語或題目文字</label><input class="fi" id="f-t" type="text" placeholder="例：守株待兔"></div>
      <div class="fl"><label>提示說明</label><input class="fi" id="f-h" type="text" placeholder="例：這個成語比喻什麼？"></div>
      <div class="fl">
        <label>四個選項</label>
        <div class="cig">
          <input class="ci2" id="c0" type="text" placeholder="選項 1">
          <input class="ci2" id="c1" type="text" placeholder="選項 2">
          <input class="ci2" id="c2" type="text" placeholder="選項 3">
          <input class="ci2" id="c3" type="text" placeholder="選項 4">
        </div>
      </div>
      <div class="fl">
        <label>正確答案是？</label>
        <div class="asel">
          <button class="ab2" id="ab0" onclick="selA(0)">選項 1</button>
          <button class="ab2" id="ab1" onclick="selA(1)">選項 2</button>
          <button class="ab2" id="ab2" onclick="selA(2)">選項 3</button>
          <button class="ab2" id="ab3" onclick="selA(3)">選項 4</button>
        </div>
      </div>
      <button class="bm" style="margin-top:.5rem" onclick="addQ()">＋ 新增題目</button>
    </div>
  </div>
</div>

<!-- 完成彈窗 -->
<div class="ov" id="ovResult">
  <div class="pop"><span class="pe">🎊</span><div class="pt" id="popTitle">完成！</div><div class="ps">答對的隊伍記得按加分 ↑</div><button class="bm" onclick="closeResult()">回地圖</button></div>
</div>

<!-- 清零確認 -->
<div class="ov" id="ovReset">
  <div class="pop"><div class="pt">確定清零？</div><div class="ps">所有分數與通關紀錄將歸零</div><div class="cbns"><button class="bd" onclick="doReset()">確定清零</button><button class="bc" onclick="closeReset()">取消</button></div></div>
</div>

<!-- 密碼 -->
<div class="ov" id="ovPw">
  <div class="pop">
    <span class="pe">🔐</span>
    <div class="pt">後台管理</div>
    <div class="ps">請輸入管理密碼</div>
    <input class="pwi" id="pwIn" type="password" placeholder="••••" maxlength="20" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="pwerr" id="pwErr"></div>
    <div class="cbns"><button class="bm" onclick="checkPw()" style="margin:0">確認進入</button><button class="bc" onclick="closePw()">取消</button></div>
  </div>
</div>

<script>
const ADMIN_PW='1234';

const DQ={
  animal:[
    {t:'狐假虎威',h:'這個成語的意思是？',c:['借助別人威勢來嚇人','老虎和狐狸是好朋友','狐狸比老虎更厲害','假裝自己是老虎'],a:0},
    {t:'守株待兔',h:'這個成語比喻什麼？',c:['農夫非常努力耕田','坐等好事自動降臨','有耐心慢慢等待','守護樹木的工作'],a:1},
    {t:'井底之蛙',h:'比喻什麼樣的人？',c:['真的住在井裡的青蛙','見識狹隘的人','膽子非常小的人','跳得很高的人'],a:1},
    {t:'對牛彈琴',h:'這個成語的意思是？',c:['牛最喜歡音樂','白費力氣對象不對','彈琴給牛聽很有趣','牛聽到琴聲很開心'],a:1},
    {t:'鶴立雞群',h:'用來形容什麼？',c:['鶴和雞是好朋友','在人群中特別出眾','喜歡跟雞在一起','鶴站得比雞高'],a:1},
    {t:'雞犬不寧',h:'這個成語形容什麼狀況？',c:['雞和狗很友好','非常吵鬧混亂的狀況','動物們在玩耍','雞和狗都生病了'],a:1},
    {t:'虎頭蛇尾',h:'比喻做事怎麼樣？',c:['老虎和蛇打架','開始強勁後來敷衍','動作很快速','外型很特別'],a:1},
    {t:'呆若木雞',h:'這個成語形容人怎麼了？',c:['非常努力不停歇','驚嚇到傻在那裡','像雞一樣跑來跑去','站得很直很標準'],a:1},
    {t:'鴉雀無聲',h:'形容什麼樣的氣氛？',c:['鳥叫聲很大聲','非常安靜沒有聲音','很多鳥在唱歌','大家都很快樂'],a:1},
    {t:'狗急跳牆',h:'這個成語說明什麼道理？',c:['狗很喜歡跳高','被逼急了什麼都做得出來','狗的跳躍能力很強','遇到危險要逃跑'],a:1},
    {t:'聞雞起舞',h:'這個成語形容人怎樣？',c:['聽到雞叫嚇一跳','非常勤奮努力練習','喜歡聽雞叫聲','早起去看雞跳舞'],a:1},
    {t:'鸚鵡學舌',h:'比喻什麼行為？',c:['鸚鵡很聰明','只會模仿別人說話','學習說話的好方法','教鸚鵡說話'],a:1},
    {t:'盲人摸象',h:'這個成語說明什麼道理？',c:['瞎子喜歡大象','只了解片面就下判斷','大象很喜歡人摸','視力不好要小心'],a:1},

const ZONES=[
  {id:'animal',name:'動物村',icon:'🐾',color:'#7bc97e',cells:[3,4,11,12],btnRow:1,btnCol:7},
  {id:'number',name:'數字街',icon:'🔢',color:'#6aabf7',cells:[21,22,29,30],btnRow:3,btnCol:5},
  {id:'color', name:'顏色坊',icon:'🎨',color:'#b48ef4',cells:[35,36,43,44],btnRow:5,btnCol:3},
  {id:'body',  name:'身體道',icon:'💪',color:'#f4a055',cells:[53,54,61,62],btnRow:7,btnCol:1},
  {id:'boss',  name:'挑戰塔',icon:'⭐',color:'#f4506a',cells:[47,48,55,56],btnRow:6,btnCol:7},
];
const cz={};ZONES.forEach(z=>z.cells.forEach(c=>{cz[c]=z.id;}));

let S=JSON.parse(localStorage.getItem('cy_v4')||'null')||{sA:0,sB:0,nA:'隊伍 A',nB:'隊伍 B',cleared:[]};
let QB=JSON.parse(localStorage.getItem('cy_qb')||'null')||JSON.parse(JSON.stringify(DQ));
let CZ=null,Qi=0,Ql=[],ans=false,azone='animal',sela=-1;

function buildMap(){
  const g=document.getElementById('mapGrid');g.innerHTML='';
  const occ={};
  ZONES.forEach(z=>{for(let dr=0;dr<2;dr++)for(let dc=0;dc<2;dc++)occ[`${z.btnRow+dr}-${z.btnCol+dc}`]=true;});
  for(let r=1;r<=8;r++){
    for(let c=1;c<=8;c++){
      const k=`${r}-${c}`;
      const bz=ZONES.find(z=>z.btnRow===r&&z.btnCol===c);
      if(bz){
        const w=document.createElement('div');w.className='zbw';
        w.style.cssText=`grid-column:${c}/span 2;grid-row:${r}/span 2`;
        const b=document.createElement('button');
        b.className='zb'+(S.cleared.includes(bz.id)?' cleared':'');
        b.style.background=`linear-gradient(145deg,${bz.color},${bz.color}aa)`;
        b.innerHTML=`<span class="zbi">${bz.icon}</span><span class="zbl">${bz.name}</span>`;
        b.onclick=()=>startQ(bz.id);w.appendChild(b);g.appendChild(w);continue;
      }
      if(occ[k])continue;
      const n=(r-1)*8+c;
      const el=document.createElement('div');el.className='mc';
      el.style.cssText=`grid-column:${c};grid-row:${r}`;
      if(cz[n])el.classList.add('zone-'+cz[n]);
      const num=document.createElement('span');num.className='cn';num.textContent=n;
      el.appendChild(num);g.appendChild(el);
    }
  }
}

function show(id){
  ['s-title','s-map','s-quest','s-admin'].forEach(s=>{
    const el=document.getElementById(s);
    el.style.display=s===id?(s==='s-title'?'flex':'block'):'none';
  });
}
function goTitle(){saveN();show('s-title');upUI();}
function goMap(){saveN();show('s-map');buildMap();upUI();}
function goAdmin(){show('s-admin');renderA();}
function saveN(){
  const a=document.getElementById('inA').value.trim();
  const b=document.getElementById('inB').value.trim();
  if(a)S.nA=a;if(b)S.nB=b;sv();
}

function startQ(id){
  CZ=ZONES.find(z=>z.id===id);
  const p=[...(QB[id]||[])];shuf(p);
  Ql=p.slice(0,Math.min(6,p.length));Qi=0;
  show('s-quest');
  document.getElementById('questTitle').textContent=CZ.icon+' '+CZ.name;
  rQ();upUI();
}
function rQ(){
  ans=false;const q=Ql[Qi];
  document.getElementById('qNum').textContent=`第 ${Qi+1} 題 ／ 共 ${Ql.length} 題`;
  document.getElementById('qTxt').textContent=q.t;
  document.getElementById('qHint').textContent=q.h;
  document.getElementById('nextBtn').style.display='none';
  const box=document.getElementById('choices');box.innerHTML='';
  q.c.forEach((c,i)=>{
    const b=document.createElement('button');b.className='cb';b.textContent=c;
    b.onclick=()=>pick(i,q.a);box.appendChild(b);
  });
}
function pick(idx,a){
  if(ans)return;ans=true;
  document.querySelectorAll('.cb').forEach((b,i)=>{
    if(i===a)b.classList.add('correct');else if(i===idx)b.classList.add('wrong');
  });
  document.getElementById('nextBtn').style.display='inline-block';
}
function nextQ(){
  Qi++;
  if(Qi>=Ql.length){
    if(!S.cleared.includes(CZ.id)){S.cleared.push(CZ.id);sv();}
    document.getElementById('popTitle').textContent=CZ.name+' 全部完成！';
    document.getElementById('ovResult').classList.add('show');
  }else rQ();
}
function addScore(t){if(t==='A')S.sA++;else S.sB++;sv();upUI();}

// ─ 後台 ─
function renderA(){
  const tabs=document.getElementById('zoneTabs');tabs.innerHTML='';
  ZONES.forEach(z=>{
    const t=document.createElement('button');t.className='ztab'+(azone===z.id?' active':'');
    t.textContent=z.icon+' '+z.name+(azone===z.id?'':' ('+( QB[z.id]||[]).length+')');
    if(azone===z.id)t.style.cssText=`background:${z.color};color:white;border-color:${z.color}`;
    t.onclick=()=>{azone=z.id;renderA();};tabs.appendChild(t);
  });
  const list=document.getElementById('qList');list.innerHTML='';
  const qs=QB[azone]||[];
  if(!qs.length){list.innerHTML='<div style="text-align:center;color:#bbb;padding:1rem;font-size:.9rem">這個關卡還沒有題目</div>';return;}
  qs.forEach((q,i)=>{
    const el=document.createElement('div');el.className='qi';
    el.innerHTML=`<div class="qi-top"><div><div class="qi-t">${q.t}</div><div class="qi-h">${q.h}</div></div><button class="delbtn" onclick="delQ(${i})">🗑 刪除</button></div><div class="cg">${q.c.map((c,ci)=>`<span class="cc${ci===q.a?' ans':''}">${ci===q.a?'✓ ':''}${c}</span>`).join('')}</div>`;
    list.appendChild(el);
  });
  // 重設表單
  sela=-1;['f-t','f-h','c0','c1','c2','c3'].forEach(id=>{document.getElementById(id).value='';});
  document.querySelectorAll('.ab2').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.ci2').forEach(b=>b.classList.remove('sa'));
}
function selA(i){
  sela=i;
  document.querySelectorAll('.ab2').forEach((b,j)=>b.classList.toggle('sel',j===i));
  document.querySelectorAll('.ci2').forEach((b,j)=>b.classList.toggle('sa',j===i));
}
function addQ(){
  const t=document.getElementById('f-t').value.trim();
  const h=document.getElementById('f-h').value.trim();
  const cs=[0,1,2,3].map(i=>document.getElementById('c'+i).value.trim());
  if(!t){alert('請填入成語或題目文字');return;}
  if(!h){alert('請填入提示說明');return;}
  if(cs.some(c=>!c)){alert('請填入全部四個選項');return;}
  if(sela<0){alert('請選擇正確答案');return;}
  if(!QB[azone])QB[azone]=[];
  QB[azone].push({t,h,c:cs,a:sela});
  svQB();renderA();
}
function delQ(i){
  if(!confirm('確定刪除這個題目？'))return;
  QB[azone].splice(i,1);svQB();renderA();
}

// ─ 密碼 ─
function showPw(){
  document.getElementById('pwIn').value='';
  document.getElementById('pwErr').textContent='';
  document.getElementById('ovPw').classList.add('show');
  setTimeout(()=>document.getElementById('pwIn').focus(),300);
}
function closePw(){document.getElementById('ovPw').classList.remove('show');}
function checkPw(){
  if(document.getElementById('pwIn').value===ADMIN_PW){closePw();goAdmin();}
  else{document.getElementById('pwErr').textContent='密碼錯誤，請再試一次';document.getElementById('pwIn').value='';}
}

// ─ 彈窗 ─
function closeResult(){document.getElementById('ovResult').classList.remove('show');goMap();}
function showReset(){document.getElementById('ovReset').classList.add('show');}
function closeReset(){document.getElementById('ovReset').classList.remove('show');}
function doReset(){S.sA=0;S.sB=0;S.cleared=[];sv();upUI();closeReset();}

// ─ 工具 ─
function sv(){localStorage.setItem('cy_v4',JSON.stringify(S));}
function svQB(){localStorage.setItem('cy_qb',JSON.stringify(QB));}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function upUI(){
  const na=S.nA||'隊伍 A',nb=S.nB||'隊伍 B';
  ['hn-a','mn-a','qn-a'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=na;});
  ['hn-b','mn-b','qn-b'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=nb;});
  ['hs-a','ms-a','qs-a','qa-s'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=S.sA;});
  ['hs-b','ms-b','qs-b','qb-s'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=S.sB;});
  document.getElementById('qa-n').textContent=na;
  document.getElementById('qb-n').textContent=nb;
  document.getElementById('inA').value=S.nA==='隊伍 A'?'':S.nA;
  document.getElementById('inB').value=S.nB==='隊伍 B'?'':S.nB;
}

if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');
upUI();
</script>
