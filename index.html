<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="成之於語">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>成之於語</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--pd:#c2506a;--pl:#fde8ec;--br:#5a2d2d}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--pl);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}
.bm{background:linear-gradient(135deg,var(--pd),#e87090);color:white;border:none;border-radius:50px;padding:.9rem 2.5rem;font-size:1.1rem;font-family:'Noto Sans TC',sans-serif;font-weight:700;cursor:pointer;letter-spacing:.1em;box-shadow:0 5px 18px rgba(194,80,106,.4);transition:all .2s;width:100%}
.bm:active{transform:scale(.96)}
.bs{background:white;color:var(--pd);border:2px solid #f4a0b0;border-radius:50px;padding:.65rem 1.8rem;font-size:.95rem;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;width:100%}
.bs:active{transform:scale(.96)}
.bb{background:#fde8ec;border:none;border-radius:50%;width:42px;height:42px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr{display:flex;align-items:center;padding:.7rem 1rem;background:white;box-shadow:0 2px 10px rgba(0,0,0,.08);gap:.5rem}
.hdr-t{font-family:'Noto Serif TC',serif;font-size:1.1rem;color:var(--pd);font-weight:900;flex:1}
.ss{display:flex;gap:.6rem}
.sc{display:flex;align-items:center;gap:.35rem;background:#fde8ec;border-radius:20px;padding:.25rem .7rem;font-size:.95rem;font-weight:700;color:var(--br)}
.sd{width:9px;height:9px;border-radius:50%}

/* ─── 標題 ─── */
#s-title{display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#fde8ec,#fdf0e0);padding:1.5rem;min-height:100vh}
.logo{font-family:'Noto Serif TC',serif;font-size:clamp(2.8rem,9vw,6rem);font-weight:900;color:var(--pd);text-shadow:4px 4px 0 rgba(194,80,106,.2);letter-spacing:.2em;margin-bottom:.2rem}
.sub{font-size:1rem;color:#a06070;letter-spacing:.3em;margin-bottom:1.5rem}
.card{background:white;border-radius:18px;padding:1.3rem 1.8rem;margin-bottom:1rem;box-shadow:0 6px 24px rgba(194,80,106,.1);width:100%;max-width:420px}
.card h3{font-size:.8rem;color:#a06070;letter-spacing:.2em;margin-bottom:.9rem;text-align:center}
.irow{display:flex;align-items:center;gap:.7rem;margin-bottom:.7rem}
.d16{width:15px;height:15px;border-radius:50%;flex-shrink:0}
.ni{flex:1;border:2px solid #f0d0d8;border-radius:11px;padding:.6rem .9rem;font-size:.95rem;font-family:'Noto Sans TC',sans-serif;color:var(--br);outline:none;transition:border-color .2s}
.ni:focus{border-color:var(--pd)}
.scores{display:flex;gap:1.5rem;justify-content:center}
.si{text-align:center}
.sid{width:13px;height:13px;border-radius:50%;margin:0 auto .35rem}
.si span{display:block;font-size:.8rem;color:#a06070;margin-bottom:.15rem}
.si strong{font-size:2.2rem;font-family:'Noto Serif TC',serif;color:var(--br)}
.btns{display:flex;flex-direction:column;gap:.8rem;align-items:center;width:100%;max-width:300px}

/* ─── 地圖：全螢幕 ─── */
#s-map{background:#f5ede8;display:none;flex-direction:column;height:100vh;overflow:hidden}
.map-wrap{flex:1;overflow:hidden;padding:.5rem;display:flex;align-items:center;justify-content:center;min-height:0}
.mgrid{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  width:100%;height:100%;
  background:white;border-radius:12px;overflow:hidden;
  box-shadow:0 6px 24px rgba(0,0,0,.1);
}
.mc{border:1px solid rgba(0,0,0,.06);position:relative;background:#fafafa;padding:2px 4px}
.cn{font-size:clamp(.35rem,.75vw,.55rem);color:#ccc;font-weight:500;line-height:1}
.zone-animal{background:rgba(123,201,126,.22)!important}
.zone-number{background:rgba(106,171,247,.22)!important}
.zone-color{background:rgba(180,142,244,.22)!important}
.zone-body{background:rgba(244,160,85,.22)!important}
.zone-boss{background:rgba(244,80,106,.18)!important}
.zone-emotion{background:rgba(255,183,77,.22)!important}
.zbw{display:flex;align-items:center;justify-content:center}
.zb{width:80%;height:80%;border:none;border-radius:50%;cursor:pointer;box-shadow:0 5px 18px rgba(0,0,0,.25);transition:all .2s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.1rem}
.zb:active{transform:scale(.88)}
.zb.cleared{opacity:.5;filter:grayscale(.4)}
.zbi{line-height:1}
.zbl{font-size:clamp(.4rem,.9vw,.65rem);font-weight:700;color:white;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.4)}
.zb-boss{width:90%!important;height:90%!important}
.zb-boss .zbi{font-size:clamp(2rem,4.5vw,3.5rem)!important}

/* ─── 關卡 ─── */
#s-quest{background:linear-gradient(160deg,#fff3e0,#fde8ec)}
.qbody{padding:1.2rem;max-width:700px;margin:0 auto}
.qcard{background:white;border-radius:22px;padding:2rem 1.8rem;box-shadow:0 6px 24px rgba(0,0,0,.08);margin-bottom:1rem;text-align:center;animation:ci .35s cubic-bezier(.34,1.56,.64,1)}
.qnum{font-size:.9rem;color:#bbb;letter-spacing:.15em;margin-bottom:.6rem}
.qtxt{font-family:'Noto Serif TC',serif;font-size:clamp(2rem,5.5vw,3.8rem);font-weight:900;color:var(--br);letter-spacing:.3em;margin:.4rem 0 .8rem;line-height:1.3}
.qhint{font-size:1rem;color:#a0a0a0}
.streak-bar{display:flex;justify-content:center;gap:.3rem;margin:.5rem 0 0}
.streak-dot{width:10px;height:10px;border-radius:50%;background:#eee;transition:background .3s}
.streak-dot.hit{background:#66bb6a}
.streak-dot.miss{background:#ef5350}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1rem}
.cb{background:white;border:3px solid #eee;border-radius:18px;padding:1.1rem .9rem;font-size:clamp(.95rem,2.3vw,1.2rem);font-family:'Noto Sans TC',sans-serif;font-weight:500;color:var(--br);cursor:pointer;transition:all .2s;line-height:1.4;min-height:74px;display:flex;align-items:center;justify-content:center;text-align:center}
.cb.correct{background:#e8f5e9;border-color:#66bb6a;color:#2e7d32}
.cb.wrong{background:#ffebee;border-color:#ef5350;color:#c62828}
.spanel{background:white;border-radius:18px;padding:.9rem;margin-bottom:1rem;display:flex;gap:.8rem;box-shadow:0 3px 12px rgba(0,0,0,.06)}
.tsb{flex:1;border:none;border-radius:14px;padding:.9rem .5rem;font-family:'Noto Sans TC',sans-serif;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.25rem;font-size:.95rem;transition:all .2s}
.tsb:active{transform:scale(.95)}
.tsb span{font-size:1.8rem;font-family:'Noto Serif TC',serif}
.nwrap{text-align:center}
#nextBtn{display:none;background:linear-gradient(135deg,var(--pd),#e87090);color:white;border:none;border-radius:50px;padding:.9rem 2.8rem;font-size:1.05rem;font-family:'Noto Sans TC',sans-serif;font-weight:700;cursor:pointer;box-shadow:0 5px 18px rgba(194,80,106,.4)}

/* ─── 後台 ─── */
#s-admin{background:#f8f0f4}
.abody{padding:1rem;max-width:820px;margin:0 auto}
.ztabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
.ztab{background:white;border:2px solid #eee;border-radius:18px;padding:.4rem .9rem;font-size:.85rem;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:500;transition:all .2s}
.ztab:active{transform:scale(.96)}
/* 後台分頁 */
.admin-tabs{display:flex;gap:.5rem;margin-bottom:1rem;border-bottom:2px solid #eee;padding-bottom:.5rem}
.atab{background:none;border:none;border-radius:10px 10px 0 0;padding:.5rem 1rem;font-size:.9rem;font-family:'Noto Sans TC',sans-serif;cursor:pointer;color:#aaa;font-weight:500;transition:all .2s}
.atab.on{background:var(--pd);color:white}
/* 題目列表 */
.qlist{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1rem}
.qi{background:white;border-radius:14px;padding:.9rem 1rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.qi-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.5rem}
.qi-t{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;color:var(--br)}
.qi-h{font-size:.75rem;color:#a0a0a0;margin-bottom:.35rem}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:.25rem}
.cc{font-size:.75rem;padding:.2rem .5rem;border-radius:7px;background:#f5f5f5;color:#666}
.cc.ans{background:#e8f5e9;color:#2e7d32;font-weight:700}
.delbtn{background:#ffebee;color:#ef5350;border:none;border-radius:8px;padding:.25rem .6rem;font-size:.8rem;cursor:pointer;flex-shrink:0;font-family:'Noto Sans TC',sans-serif}
.editbtn{background:#e3f2fd;color:#1976d2;border:none;border-radius:8px;padding:.25rem .6rem;font-size:.8rem;cursor:pointer;flex-shrink:0;font-family:'Noto Sans TC',sans-serif;margin-right:.3rem}
/* 新增/編輯表單 */
.aform{background:white;border-radius:18px;padding:1.3rem;box-shadow:0 3px 14px rgba(0,0,0,.07);margin-bottom:1rem}
.aform h3{font-size:.95rem;color:var(--pd);font-weight:700;margin-bottom:.9rem}
.fl{margin-bottom:.7rem}
.fl label{display:block;font-size:.77rem;color:#a06070;margin-bottom:.25rem;font-weight:500}
.fi{width:100%;border:2px solid #f0d0d8;border-radius:9px;padding:.55rem .8rem;font-size:.9rem;font-family:'Noto Sans TC',sans-serif;color:var(--br);outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--pd)}
.cig{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-bottom:.4rem}
.ci2{width:100%;border:2px solid #eee;border-radius:9px;padding:.55rem .8rem;font-size:.85rem;font-family:'Noto Sans TC',sans-serif;color:var(--br);outline:none;transition:all .2s}
.ci2.sa{border-color:#66bb6a;background:#f0fff4}
.ci2:focus{border-color:var(--pd)}
.asel{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.7rem}
.ab2{background:#f5f5f5;border:2px solid #eee;border-radius:9px;padding:.35rem .8rem;font-size:.8rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s}
.ab2.sel{background:#e8f5e9;border-color:#66bb6a;color:#2e7d32;font-weight:700}
/* 題數設定 */
.qnum-row{display:flex;align-items:center;gap:.8rem;background:white;border-radius:12px;padding:.8rem 1rem;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:.6rem}
.qnum-label{flex:1;font-size:.9rem;color:var(--br)}
.qnum-ctrl{display:flex;align-items:center;gap:.5rem}
.qnum-btn{width:32px;height:32px;border:none;border-radius:50%;background:#fde8ec;color:var(--pd);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.qnum-val{font-size:1.1rem;font-weight:700;color:var(--br);min-width:28px;text-align:center}
/* 分數設定 */
.score-edit-row{display:flex;align-items:center;gap:.8rem;background:white;border-radius:12px;padding:.8rem 1rem;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:.6rem}
.score-edit-label{flex:1;display:flex;align-items:center;gap:.5rem;font-size:.95rem;color:var(--br);font-weight:500}
/* 獎懲 */
.reward-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.8rem}
.reward-item{display:flex;align-items:center;gap:.5rem;background:white;border-radius:10px;padding:.6rem .9rem;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.reward-text{flex:1;font-size:.9rem;color:var(--br)}
.reward-del{background:#ffebee;color:#ef5350;border:none;border-radius:7px;padding:.2rem .55rem;font-size:.8rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.reward-add-row{display:flex;gap:.5rem}
.reward-input{flex:1;border:2px solid #f0d0d8;border-radius:9px;padding:.55rem .8rem;font-size:.9rem;font-family:'Noto Sans TC',sans-serif;color:var(--br);outline:none}
.reward-input:focus{border-color:var(--pd)}
.reward-add-btn{background:var(--pd);color:white;border:none;border-radius:9px;padding:.55rem 1rem;font-size:.85rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:700;white-space:nowrap}

/* ─── 彈窗 ─── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center}
.ov.show{display:flex}
.pop{background:white;border-radius:26px;padding:2.2rem 1.8rem;text-align:center;max-width:360px;width:92%;animation:ci .35s cubic-bezier(.34,1.56,.64,1)}
.pe{font-size:4rem;display:block;margin-bottom:.8rem}
.pt{font-family:'Noto Serif TC',serif;font-size:1.7rem;font-weight:900;color:var(--br);margin-bottom:.4rem}
.ps{font-size:.95rem;color:#a0a0a0;margin-bottom:1.8rem}
.cbns{display:flex;gap:.7rem;margin-top:1rem}
.bd{flex:1;background:#ef5350;color:white;border:none;border-radius:11px;padding:.8rem;font-size:.95rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:700}
.bc{flex:1;background:#f5f5f5;color:#666;border:none;border-radius:11px;padding:.8rem;font-size:.95rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.pwi{width:100%;border:2px solid #f0d0d8;border-radius:11px;padding:.75rem 1rem;font-size:1.1rem;text-align:center;letter-spacing:.3em;outline:none;margin:.8rem 0;font-family:'Noto Sans TC',sans-serif;color:var(--br)}
.pwi:focus{border-color:var(--pd)}
.pwerr{color:#ef5350;font-size:.82rem;min-height:1.1rem;margin-bottom:.4rem}

/* ─── 抽獎畫面 ─── */
#ov-lottery .pop{max-width:420px}
.lottery-title{font-family:'Noto Serif TC',serif;font-size:1.5rem;font-weight:900;margin-bottom:.3rem}
.lottery-sub{font-size:.9rem;color:#a0a0a0;margin-bottom:1.2rem}
.lottery-reel{background:linear-gradient(135deg,#fff3e0,#fde8ec);border-radius:18px;padding:1.5rem 1rem;margin-bottom:1.2rem;min-height:80px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:var(--br);font-family:'Noto Serif TC',serif;text-align:center;border:3px solid #f4a0b0;transition:all .3s}
.lottery-reel.spinning{animation:spin .15s linear infinite}
.lottery-result{font-size:1.6rem;font-weight:900;color:var(--pd);font-family:'Noto Serif TC',serif;min-height:2rem}
@keyframes spin{0%{transform:scale(.97)}50%{transform:scale(1.03)}100%{transform:scale(.97)}}

@keyframes ci{from{opacity:0;transform:scale(.88) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes confetti{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;animation:confetti 2s ease-in forwards;pointer-events:none;z-index:300}
</style>
</head>
<body>

<!-- ════ 標題 ════ -->
<div id="s-title">
  <div class="logo">成之於語</div>
  <div class="sub">成語地圖探險</div>
  <div class="card">
    <h3>✏️ 輸入隊伍名稱</h3>
    <div class="irow"><div class="d16" style="background:#f4a0b0"></div><input class="ni" id="inA" type="text" placeholder="隊伍 A" maxlength="8"></div>
    <div class="irow"><div class="d16" style="background:#6aabf7"></div><input class="ni" id="inB" type="text" placeholder="隊伍 B" maxlength="8"></div>
  </div>
  <div class="card">
    <h3>📊 當前分數</h3>
    <div class="scores">
      <div class="si"><div class="sid" style="background:#f4a0b0"></div><span id="hn-a">隊伍 A</span><strong id="hs-a">0</strong></div>
      <div class="si"><div class="sid" style="background:#6aabf7"></div><span id="hn-b">隊伍 B</span><strong id="hs-b">0</strong></div>
    </div>
  </div>
  <div class="btns">
    <button class="bm" onclick="goMap()">🗺️ 開始探險</button>
    <button class="bs" onclick="showReset()">🔄 清零分數</button>
    <button class="bs" onclick="showPw()" style="border-color:#b48ef4;color:#7c52c8">⚙️ 後台管理</button>
  </div>
</div>

<!-- ════ 地圖（全螢幕） ════ -->
<div id="s-map" style="display:none;flex-direction:column;height:100vh;overflow:hidden;background:#f5ede8">
  <div class="hdr">
    <button class="bb" onclick="goTitle()">←</button>
    <div class="hdr-t">🗺️ 成語大地圖</div>
    <div class="ss">
      <div class="sc"><div class="sd" style="background:#f4a0b0"></div><span id="mn-a">A</span>&nbsp;<b id="ms-a">0</b></div>
      <div class="sc"><div class="sd" style="background:#6aabf7"></div><span id="mn-b">B</span>&nbsp;<b id="ms-b">0</b></div>
    </div>
  </div>
  <div class="map-wrap">
    <div class="mgrid" id="mapGrid"></div>
  </div>
</div>

<!-- ════ 關卡 ════ -->
<div id="s-quest" class="screen">
  <div class="hdr">
    <button class="bb" onclick="goMap()">←</button>
    <div class="hdr-t" id="questTitle">關卡</div>
    <div class="ss">
      <div class="sc"><div class="sd" style="background:#f4a0b0"></div><span id="qn-a">A</span>&nbsp;<b id="qs-a">0</b></div>
      <div class="sc"><div class="sd" style="background:#6aabf7"></div><span id="qn-b">B</span>&nbsp;<b id="qs-b">0</b></div>
    </div>
  </div>
  <div class="qbody">
    <div class="qcard">
      <div class="qnum" id="qNum">第 1 題 ／ 共 6 題</div>
      <div class="qtxt" id="qTxt"></div>
      <div class="qhint" id="qHint"></div>
      <div class="streak-bar" id="streakBarA"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="spanel">
      <button class="tsb" style="background:#fff0f3;color:#c2506a" onclick="addScore('A')"><span id="qa-s">0</span><div id="qa-n">隊伍 A</div>＋1 分</button>
      <button class="tsb" style="background:#f0f6ff;color:#3a7fd5" onclick="addScore('B')"><span id="qb-s">0</span><div id="qb-n">隊伍 B</div>＋1 分</button>
    </div>
    <div class="nwrap"><button id="nextBtn" onclick="nextQ()">下一題 →</button></div>
  </div>
</div>

<!-- ════ 後台 ════ -->
<div id="s-admin" class="screen" style="background:#f8f0f4">
  <div class="hdr">
    <button class="bb" onclick="goTitle()">←</button>
    <div class="hdr-t">⚙️ 後台管理</div>
  </div>
  <div class="abody">
    <!-- 後台主分頁 -->
    <div class="admin-tabs">
      <button class="atab on" id="atab-q" onclick="switchAtab('q')">📝 題目管理</button>
      <button class="atab" id="atab-s" onclick="switchAtab('s')">🎯 分數設定</button>
      <button class="atab" id="atab-r" onclick="switchAtab('r')">🎁 獎懲設定</button>
    </div>

    <!-- 題目管理 -->
    <div id="apanel-q">
      <div class="ztabs" id="zoneTabs"></div>
      <!-- 題數設定 -->
      <div id="qnum-row-wrap" class="qnum-row">
        <div class="qnum-label">每次出題數量</div>
        <div class="qnum-ctrl">
          <button class="qnum-btn" onclick="changeQNum(-1)">−</button>
          <div class="qnum-val" id="qnum-display">6</div>
          <button class="qnum-btn" onclick="changeQNum(1)">＋</button>
        </div>
      </div>
      <div class="qlist" id="qList"></div>
      <div class="aform" id="addForm">
        <h3 id="formTitle">＋ 新增題目</h3>
        <input type="hidden" id="editIdx" value="-1">
        <div class="fl"><label>成語或題目文字</label><input class="fi" id="f-t" type="text" placeholder="例：守株待兔"></div>
        <div class="fl"><label>提示說明</label><input class="fi" id="f-h" type="text" placeholder="例：這個成語比喻什麼？"></div>
        <div class="fl">
          <label>四個選項</label>
          <div class="cig">
            <input class="ci2" id="c0" type="text" placeholder="選項 1">
            <input class="ci2" id="c1" type="text" placeholder="選項 2">

  {id:'body',    name:'身體道', icon:'💪', color:'#f4a055', cells:[53,54,61,62], btnRow:7, btnCol:1, isBoss:false},
  {id:'emotion', name:'情緒橋', icon:'😊', color:'#ffb74d', cells:[9,10,17,18],  btnRow:2, btnCol:3, isBoss:false},
  {id:'boss',    name:'挑戰塔', icon:'⭐', color:'#f4506a', cells:[47,48,55,56], btnRow:6, btnCol:7, isBoss:true},
];
const CZmap={};ZONES.forEach(z=>z.cells.forEach(c=>{CZmap[c]=z.id;}));

// ════════════════════════════════════
// 狀態
// ════════════════════════════════════
let S = JSON.parse(localStorage.getItem('cy_v5')||'null') || {sA:0,sB:0,nA:'隊伍 A',nB:'隊伍 B',cleared:[]};
let QB = JSON.parse(localStorage.getItem('cy_qb2')||'null') || JSON.parse(JSON.stringify(DQ));
let CFG = JSON.parse(localStorage.getItem('cy_cfg')||'null') || {
  qPerZone:{animal:6,number:6,color:6,body:6,emotion:6,boss:6},
  streakWin:5, streakLose:5,
  rewards:['加 1 分！','全隊站起來歡呼！','老師說一個笑話！','隊長帶全隊跳一下！','免做一題！'],
  punishments:['扣 1 分！','全隊拍手三下！','站起來轉一圈！','學鴨子叫三聲！','幫對手鼓掌！']
};

let CZ=null,Qi=0,Ql=[],answered=false;
let streakA=0,streakB=0; // 連續答對/錯（正=答對，負=答錯）
let lastTeam=''; // 上一個加分的隊伍
let azone='animal',sela=-1,curAtab='q';

// ════════════════════════════════════
// 地圖
// ════════════════════════════════════
function buildMap(){
  const g=document.getElementById('mapGrid');g.innerHTML='';
  const occ={};
  ZONES.forEach(z=>{for(let dr=0;dr<2;dr++)for(let dc=0;dc<2;dc++)occ[`${z.btnRow+dr}-${z.btnCol+dc}`]=true;});
  for(let r=1;r<=8;r++){
    for(let c=1;c<=8;c++){
      const k=`${r}-${c}`;
      const bz=ZONES.find(z=>z.btnRow===r&&z.btnCol===c);
      if(bz){
        const w=document.createElement('div');w.className='zbw';
        w.style.cssText=`grid-column:${c}/span 2;grid-row:${r}/span 2`;
        const b=document.createElement('button');
        const isBoss=bz.isBoss;
        b.className='zb'+(isBoss?' zb-boss':'')+(S.cleared.includes(bz.id)?' cleared':'');
        b.style.background=`linear-gradient(145deg,${bz.color},${bz.color}aa)`;
        const iconSize=isBoss?'clamp(2rem,4.5vw,3.5rem)':'clamp(1.5rem,3.5vw,2.6rem)';
        b.innerHTML=`<span class="zbi" style="font-size:${iconSize}">${bz.icon}</span><span class="zbl">${bz.name}</span>`;
        b.onclick=()=>startQ(bz.id);w.appendChild(b);g.appendChild(w);continue;
      }
      if(occ[k])continue;
      const n=(r-1)*8+c;
      const el=document.createElement('div');el.className='mc';
      el.style.cssText=`grid-column:${c};grid-row:${r}`;
      if(CZmap[n])el.classList.add('zone-'+CZmap[n]);
      const num=document.createElement('span');num.className='cn';num.textContent=n;
      el.appendChild(num);g.appendChild(el);
    }
  }
}

// ════════════════════════════════════
// 畫面切換
// ════════════════════════════════════
function showScreen(id){
  ['s-title','s-map','s-quest','s-admin'].forEach(s=>{
    const el=document.getElementById(s);
    if(s===id){
      el.style.display=(s==='s-map')?'flex':(s==='s-title'?'flex':'block');
    } else {
      el.style.display='none';
    }
  });
}
function goTitle(){saveN();showScreen('s-title');upUI();}
function goMap(){saveN();showScreen('s-map');buildMap();upUI();}
function goAdmin(){showScreen('s-admin');switchAtab(curAtab);renderAdmin();}
function saveN(){
  const a=document.getElementById('inA').value.trim();
  const b=document.getElementById('inB').value.trim();
  if(a)S.nA=a;if(b)S.nB=b;sv();
}

// ════════════════════════════════════
// 關卡
// ════════════════════════════════════
function startQ(id){
  CZ=ZONES.find(z=>z.id===id);
  const pool=[...(QB[id]||[])];shuf(pool);
  const num=CFG.qPerZone[id]||6;
  Ql=pool.slice(0,Math.min(num,pool.length));
  Qi=0;
  showScreen('s-quest');
  document.getElementById('questTitle').textContent=CZ.icon+' '+CZ.name;
  rQ();upUI();
}

function rQ(){
  answered=false;
  const q=Ql[Qi];
  document.getElementById('qNum').textContent=`第 ${Qi+1} 題 ／ 共 ${Ql.length} 題`;
  document.getElementById('qTxt').textContent=q.t;
  document.getElementById('qHint').textContent=q.h;
  document.getElementById('nextBtn').style.display='none';
  // 連擊條
  renderStreakBar();
  const box=document.getElementById('choices');box.innerHTML='';
  q.c.forEach((c,i)=>{
    const b=document.createElement('button');b.className='cb';b.textContent=c;
    b.onclick=()=>pick(i,q.a);box.appendChild(b);
  });
}

function pick(idx,ans){
  if(answered)return;answered=true;
  document.querySelectorAll('.cb').forEach((b,i)=>{
    if(i===ans)b.classList.add('correct');else if(i===idx)b.classList.add('wrong');
  });
  document.getElementById('nextBtn').style.display='inline-block';
}

function nextQ(){
  Qi++;
  if(Qi>=Ql.length){
    if(!S.cleared.includes(CZ.id)){S.cleared.push(CZ.id);sv();}
    document.getElementById('popTitle').textContent=CZ.name+' 全部完成！';
    document.getElementById('ovResult').classList.add('show');
  }else rQ();
}

function addScore(team){
  if(team==='A')S.sA++;else S.sB++;
  sv();

  // 連擊判斷：只有答題後才算（answered=true代表剛剛有答）
  if(answered){
    const allCb=document.querySelectorAll('.cb');
    let wasCorrect=false;
    allCb.forEach(b=>{if(b.classList.contains('correct')&&b.style.cursor!=='default')wasCorrect=true;});
    // 用答對/答錯的class判斷
    const correctBtn=document.querySelector('.cb.correct');
    // 若加分，記錄連擊
    recordStreak(team, true); // 每次按加分算答對
  }
  upUI();
}

// streak 正數=連續答對，負數=連續答錯
function recordStreak(team, correct){
  if(team==='A'){
    if(correct){ streakA= streakA>=0? streakA+1: 1; }
    else{ streakA= streakA<=0? streakA-1: -1; }
    checkStreak('A', streakA);
  } else {
    if(correct){ streakB= streakB>=0? streakB+1: 1; }
    else{ streakB= streakB<=0? streakB-1: -1; }
    checkStreak('B', streakB);
  }
}

function checkStreak(team, streak){
  if(streak>=CFG.streakWin){
    // 觸發抽獎
    setTimeout(()=>openLottery(team,'win'),300);
    if(team==='A')streakA=0;else streakB=0;
  } else if(streak<=-CFG.streakLose){
    setTimeout(()=>openLottery(team,'lose'),300);
    if(team==='A')streakA=0;else streakB=0;
  }
}

function renderStreakBar(){
  const bar=document.getElementById('streakBarA');
  bar.innerHTML='';
  const streak=Math.max(Math.abs(streakA),Math.abs(streakB));
  const maxN=Math.max(CFG.streakWin,CFG.streakLose);
  for(let i=0;i<maxN;i++){
    const d=document.createElement('div');d.className='streak-dot';
    if(i<Math.abs(streakA)||i<Math.abs(streakB)){
      d.classList.add(streakA>0||streakB>0?'hit':'miss');
    }
    bar.appendChild(d);
  }
}

// ════════════════════════════════════
// 抽獎
// ════════════════════════════════════
let lotType='win',lotTeam='A',lotSpinning=false;
function openLottery(team,type){
  lotType=type;lotTeam=team;lotSpinning=false;
  const na=team==='A'?S.nA:S.nB;
  document.getElementById('lot-emoji').textContent=type==='win'?'🎉':'😱';
  document.getElementById('lot-title').textContent=type==='win'
    ?`${na} 連續答對${CFG.streakWin}題！`
    :`${na} 連續答錯${CFG.streakLose}題！`;
  document.getElementById('lot-sub').textContent=type==='win'?'點下方按鈕抽取獎勵！':'點下方按鈕抽取懲罰！';
  document.getElementById('lot-reel').textContent=type==='win'?'按下抽獎！':'按下抽罰！';
  document.getElementById('lot-reel').classList.remove('spinning');
  document.getElementById('lot-result').textContent='';
  document.getElementById('lot-btn').style.display='block';
  document.getElementById('lot-close').style.display='none';
  document.getElementById('ov-lottery').classList.add('show');
  if(type==='win')spawnConfetti();
}

function spinLottery(){
  if(lotSpinning)return;
  lotSpinning=true;
  const pool=lotType==='win'?CFG.rewards:CFG.punishments;
  if(!pool.length){
    document.getElementById('lot-reel').textContent='（尚未設定項目）';
    document.getElementById('lot-btn').style.display='none';
    document.getElementById('lot-close').style.display='block';
    return;
  }
  const reel=document.getElementById('lot-reel');
  reel.classList.add('spinning');
  let count=0;
  const interval=setInterval(()=>{
    reel.textContent=pool[Math.floor(Math.random()*pool.length)];
    count++;
    if(count>18){
      clearInterval(interval);
      reel.classList.remove('spinning');
      const result=pool[Math.floor(Math.random()*pool.length)];
      reel.textContent=result;
      document.getElementById('lot-result').textContent='🎯 ' + result;
      document.getElementById('lot-btn').style.display='none';
      document.getElementById('lot-close').style.display='block';
    }
  },80);
}

function closeLottery(){document.getElementById('ov-lottery').classList.remove('show');}

function spawnConfetti(){
  const colors=['#f4a0b0','#6aabf7','#7bc97e','#b48ef4','#f4d460','#f4a055'];
  for(let i=0;i<30;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*1}s;animation-duration:${1.5+Math.random()}s;transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3000);
  }
}

// ════════════════════════════════════
// 後台
// ════════════════════════════════════
function switchAtab(tab){
  curAtab=tab;
  ['q','s','r'].forEach(t=>{
    document.getElementById('atab-'+t).classList.toggle('on',t===tab);
    document.getElementById('apanel-'+t).style.display=t===tab?'block':'none';
  });
  if(tab==='q')renderAdmin();
  if(tab==='s')renderScoreAdmin();
  if(tab==='r')renderRewardAdmin();
}

function renderAdmin(){
  // 分頁按鈕
  const tabs=document.getElementById('zoneTabs');tabs.innerHTML='';
  ZONES.forEach(z=>{
    const t=document.createElement('button');t.className='ztab'+(azone===z.id?' active':'');
    t.textContent=z.icon+' '+z.name+' ('+(QB[z.id]||[]).length+')';
    if(azone===z.id)t.style.cssText=`background:${z.color};color:white;border-color:${z.color}`;
    t.onclick=()=>{azone=z.id;cancelEdit();renderAdmin();};tabs.appendChild(t);
  });
  // 題數
  const qn=CFG.qPerZone[azone]||6;
  document.getElementById('qnum-display').textContent=qn;
  // 題目列表
  const list=document.getElementById('qList');list.innerHTML='';
  const qs=QB[azone]||[];
  if(!qs.length){list.innerHTML='<div style="text-align:center;color:#bbb;padding:.8rem;font-size:.85rem">這個關卡還沒有題目</div>';return;}
  qs.forEach((q,i)=>{
    const el=document.createElement('div');el.className='qi';
    el.innerHTML=`<div class="qi-top"><div><div class="qi-t">${q.t}</div><div class="qi-h">${q.h}</div></div><div style="display:flex;gap:.3rem"><button class="editbtn" onclick="editQ(${i})">✏️ 編輯</button><button class="delbtn" onclick="delQ(${i})">🗑 刪除</button></div></div><div class="cg">${q.c.map((c,ci)=>`<span class="cc${ci===q.a?' ans':''}">${ci===q.a?'✓ ':''}${c}</span>`).join('')}</div>`;
    list.appendChild(el);
  });
}

function editQ(idx){
  const q=(QB[azone]||[])[idx];if(!q)return;
  document.getElementById('editIdx').value=idx;
  document.getElementById('f-t').value=q.t;
  document.getElementById('f-h').value=q.h;
  [0,1,2,3].forEach(i=>{document.getElementById('c'+i).value=q.c[i]||'';});
  selA(q.a);
  document.getElementById('formTitle').textContent='✏️ 編輯題目';
  document.getElementById('cancelEditBtn').style.display='block';
  document.getElementById('addForm').scrollIntoView({behavior:'smooth'});
}

function cancelEdit(){
  document.getElementById('editIdx').value='-1';
  document.getElementById('formTitle').textContent='＋ 新增題目';
  document.getElementById('cancelEditBtn').style.display='none';
  sela=-1;
  ['f-t','f-h','c0','c1','c2','c3'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('.ab2').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.ci2').forEach(b=>b.classList.remove('sa'));
}

function selA(i){
  sela=i;
  document.querySelectorAll('.ab2').forEach((b,j)=>b.classList.toggle('sel',j===i));
  document.querySelectorAll('.ci2').forEach((b,j)=>b.classList.toggle('sa',j===i));
}

function saveQ(){
  const t=document.getElementById('f-t').value.trim();
  const h=document.getElementById('f-h').value.trim();
  const cs=[0,1,2,3].map(i=>document.getElementById('c'+i).value.trim());
  if(!t){alert('請填入成語或題目文字');return;}
  if(!h){alert('請填入提示說明');return;}
  if(cs.some(c=>!c)){alert('請填入全部四個選項');return;}
  if(sela<0){alert('請選擇正確答案');return;}
  if(!QB[azone])QB[azone]=[];
  const idx=parseInt(document.getElementById('editIdx').value);
  const entry={t,h,c:cs,a:sela};
  if(idx>=0){QB[azone][idx]=entry;}else{QB[azone].push(entry);}
  svQB();cancelEdit();renderAdmin();
}

function delQ(i){
  if(!confirm('確定刪除這個題目？'))return;
  QB[azone].splice(i,1);svQB();renderAdmin();
}

function changeQNum(d){
  const cur=CFG.qPerZone[azone]||6;
  CFG.qPerZone[azone]=Math.max(1,Math.min(20,cur+d));
  svCFG();document.getElementById('qnum-display').textContent=CFG.qPerZone[azone];
}

function renderScoreAdmin(){
  document.getElementById('se-na').textContent=S.nA||'隊伍 A';
  document.getElementById('se-nb').textContent=S.nB||'隊伍 B';
  document.getElementById('se-sa').textContent=S.sA;
  document.getElementById('se-sb').textContent=S.sB;
  document.getElementById('streak-win-val').textContent=CFG.streakWin;
  document.getElementById('streak-lose-val').textContent=CFG.streakLose;
}

function manualScore(team,d){
  if(team==='A')S.sA=Math.max(0,S.sA+d);
  else S.sB=Math.max(0,S.sB+d);
  sv();upUI();renderScoreAdmin();
}

function changeStreak(type,d){
  if(type==='win'){CFG.streakWin=Math.max(2,Math.min(10,CFG.streakWin+d));document.getElementById('streak-win-val').textContent=CFG.streakWin;}
  else{CFG.streakLose=Math.max(2,Math.min(10,CFG.streakLose+d));document.getElementById('streak-lose-val').textContent=CFG.streakLose;}
  svCFG();
}

function renderRewardAdmin(){
  renderRewardList('win');renderRewardList('lose');
}

function renderRewardList(type){
  const list=document.getElementById('reward-'+type+'-list');
  list.innerHTML='';
  const items=type==='win'?CFG.rewards:CFG.punishments;
  if(!items.length){list.innerHTML='<div style="color:#bbb;font-size:.85rem;padding:.4rem">尚未設定</div>';return;}
  items.forEach((item,i)=>{
    const el=document.createElement('div');el.className='reward-item';
    el.innerHTML=`<div class="reward-text">${item}</div><button class="reward-del" onclick="delReward('${type}',${i})">刪除</button>`;
    list.appendChild(el);
  });
}

function addReward(type){
  const inp=document.getElementById('reward-'+type+'-input');
  const val=inp.value.trim();
  if(!val){alert('請輸入內容');return;}
  if(type==='win')CFG.rewards.push(val);else CFG.punishments.push(val);
  inp.value='';svCFG();renderRewardList(type);
}

function delReward(type,i){
  if(type==='win')CFG.rewards.splice(i,1);else CFG.punishments.splice(i,1);
  svCFG();renderRewardList(type);
}

// ════════════════════════════════════
// 彈窗
// ════════════════════════════════════
function closeResult(){document.getElementById('ovResult').classList.remove('show');goMap();}
function showReset(){document.getElementById('ovReset').classList.add('show');}
function closeReset(){document.getElementById('ovReset').classList.remove('show');}
function doReset(){S.sA=0;S.sB=0;S.cleared=[];sv();upUI();closeReset();if(curAtab==='s')renderScoreAdmin();}
function showPw(){document.getElementById('pwIn').value='';document.getElementById('pwErr').textContent='';document.getElementById('ovPw').classList.add('show');setTimeout(()=>document.getElementById('pwIn').focus(),300);}
function closePw(){document.getElementById('ovPw').classList.remove('show');}
function checkPw(){if(document.getElementById('pwIn').value===ADMIN_PW){closePw();goAdmin();}else{document.getElementById('pwErr').textContent='密碼錯誤，請再試一次';document.getElementById('pwIn').value='';}}

// ════════════════════════════════════
// 工具
// ════════════════════════════════════
function sv(){localStorage.setItem('cy_v5',JSON.stringify(S));}
function svQB(){localStorage.setItem('cy_qb2',JSON.stringify(QB));}
function svCFG(){localStorage.setItem('cy_cfg',JSON.stringify(CFG));}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function upUI(){
  const na=S.nA||'隊伍 A',nb=S.nB||'隊伍 B';
  ['hn-a','mn-a','qn-a'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=na;});
  ['hn-b','mn-b','qn-b'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=nb;});
  ['hs-a','ms-a','qs-a','qa-s'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=S.sA;});
  ['hs-b','ms-b','qs-b','qb-s'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=S.sB;});
  const qan=document.getElementById('qa-n');if(qan)qan.textContent=na;
  const qbn=document.getElementById('qb-n');if(qbn)qbn.textContent=nb;
  document.getElementById('inA').value=S.nA==='隊伍 A'?'':S.nA;
  document.getElementById('inB').value=S.nB==='隊伍 B'?'':S.nB;
}

if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');
upUI();
</script>
